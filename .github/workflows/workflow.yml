name: Build Hostlists Registry

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Hostlists Registry
    if: '!contains(github.event.head_commit.message, ''skip ci'')'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo with depth 1
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: yarn install
        run: yarn install

      - name: yarn lint
        run: yarn lint

      - name: yarn compose
        run: yarn compose

      - name: Commit & Push changes
        if: github.ref == 'refs/heads/main' && github.repository == 'AdguardTeam/HostlistsRegistry'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "skip ci: auto-build"
          git push

  notify:
    name: Send Slack notification on failure
    runs-on: ubuntu-latest
    needs: build
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    # Run even if the build job failed, but only for our own repo
    if:
      ${{
        always() &&
        needs.build.result == 'failure' &&
        github.repository == 'AdguardTeam/HostlistsRegistry' &&
        (
          github.event_name == 'push' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          )
        )
      }}
    steps:
      - name: Notify Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          PAYLOAD=$(jq -n \
            --arg text ":no_entry: Failed GitHub Actions" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg ref "$GITHUB_REF" \
            --arg event "$GITHUB_EVENT_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg run_url "$RUN_URL" \
            '{text:$text, blocks:[
              {type:"section", text:{type:"mrkdwn", text:":no_entry: *Failed GitHub Actions*"}},
              {type:"context", elements:[{type:"mrkdwn", text:"*workflow:* \($workflow)\n*repo:* \($repo)\n*ref:* \($ref)\n*event:* \($event)\n*commit:* <\($commit_url)|\($sha)>\n*run:* <\($run_url)|Build Hostlists Registry>"}]}
            ]}'
          )
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
